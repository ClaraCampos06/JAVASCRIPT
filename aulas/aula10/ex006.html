<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos DOM</title>
    <style>
        div#area{
            background-color: rgb(118, 47, 47);
            height: 200px;
            width: 200px;
            text-align: center;
            line-height: 200px;
            color: white;
            font-family: 'Trebuchet MS';
            font-size: 1.5em;
            margin: auto;
            
        }
    </style>
</head>
<body>
    <div id="area" onclick="clicar()" onmouseenter="entrar()" onmouseout="sair()" onmousemove="mover()">
    Click Here...
    </div>
    <script>
        var a = window.document.getElementById('area')
        a.addEventListener('click', clicar)
        a.addEventListener('mouseenter', entrar)
        a.addEventListener('mouseout', sair)

        function clicar() {
            a.innerText = 'Clicou manso...'
            a.style.background = 'darkolivegreen'
        }
        function entrar(){
            a.innerText = 'Entrou manso'
        }
        function sair(){
            a.innerText = 'Saiu manso'
            a.style.background = 'rgb(118, 47, 47)'
            a.style.color = 'white'
        }
        
        
    </script>
</body>
</html>
